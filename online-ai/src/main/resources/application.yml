spring:
  application:
    name: online-ai
  profiles:
    active: local
  security:
    jwt:
      key: ${SPRING_SECURITY_JWT_KEY}
      expire: 24
      limit:
        base: 60
        upgrade: 120
        frequency: 3

  rabbitmq:
    # addresses: 192.168.116.128
    addresses: ${SPRING_RABBITMQ_ADDRESSES}
    port: ${SPRING_RABBITMQ_PORT}
    username: ${SPRING_RABBITMQ_USERNAME}
    password: ${SPRING_RABBITMQ_PASSWORD}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST}
    listener:
      simple:
        acknowledge-mode: auto
        concurrency: 5
        max-concurrency: 10
        prefetch: 1

  ai:
    governance:
      quota:
        global-daily-limit: 120
        global-hourly-limit: 20
        student-daily-limit: 40
        student-hourly-limit: 8
        teacher-daily-limit: 100
        teacher-hourly-limit: 20
        admin-daily-limit: 300
        admin-hourly-limit: 60
      review:
        enabled: true
        blocked-keywords:
          - 刷单
          - 赌博
          - 外挂
          - 爆破
        review-keywords:
          - 代写
          - 绕过检测
          - 破解
          - 批量注册
      retry:
        max-attempts: 3
        fallback-platforms:
          - openai
          - deepseek
          - qwen
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY}
      base-url: ${SPRING_AI_OPENAI_BASE_URL}
      chat:
        options:
          model: deepseek-chat
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 1536
    dashscope:
      api-key: ${SPRING_AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
    deepseek:
      api-key: ${SPRING_AI_DEEPSEEK_API_KEY}
      base-url: ${SPRING_AI_DEEPSEEK_BASE_URL}
      chat:
        options:
          model: deepseek-chat

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
      password: ${SPRING_DATA_REDIS_PASSWORD}
    mongodb:
      host: ${SPRING_DATA_MONGODB_HOST}
      port: ${SPRING_DATA_MONGODB_PORT}
      database: ${SPRING_DATA_MONGODB_DATABASE}
      username: ${SPRING_DATA_MONGODB_USERNAME}
      password: ${SPRING_DATA_MONGODB_PASSWORD}
      authentication-database: ${SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE}
      uri: ${SPRING_DATA_MONGODB_URI}

server:
  port: 8088