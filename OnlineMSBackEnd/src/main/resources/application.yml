spring:
  application:
    name: OnlineMSBackEnd
  profiles:
    active: local

  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB
      enabled: true
  rabbitmq:
    # addresses: 192.168.116.128
    addresses: ${SPRING_RABBITMQ_ADDRESSES}
    port: ${SPRING_RABBITMQ_PORT}
    username: ${SPRING_RABBITMQ_USERNAME}
    password: ${SPRING_RABBITMQ_PASSWORD}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST}
    publisher-confirm-type: correlated
    publisher-returns: true
  datasource:
    # 统一使用东八区，避免前端输入本地时间后在JDBC层被按UTC偏移8小时写入数据库
    # 说明：
    # 1) 前端传入的是本地业务时间（如 2026-03-05 00:00:00）
    # 2) 后端当前时间模型包含 java.util.Date（瞬时时间），会经过JDBC时区换算
    # 3) 若此处配置为 UTC，会出现“前端00:00，数据库落16:00(前一天)”的问题
    # 因此将 serverTimezone 调整为 Asia/Shanghai，保证写入与读取都按业务时区一致
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
      password: ${SPRING_DATA_REDIS_PASSWORD}
    mongodb:
      host: ${SPRING_DATA_MONGODB_HOST}
      port: ${SPRING_DATA_MONGODB_PORT}
      database: ${SPRING_DATA_MONGODB_DATABASE}
      username: ${SPRING_DATA_MONGODB_USERNAME}
      password: ${SPRING_DATA_MONGODB_PASSWORD}
      authentication-database: ${SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE}
      uri: ${SPRING_DATA_MONGODB_URI}
  mail:
    host: ${SPRING_MAIL_HOST}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    default-encoding: utf-8
  security:
    jwt:
      key: ${SPRING_SECURITY_JWT_KEY}
      expire: 72
      limit:
        base: 10
        upgrade: 300
        frequency: 30
    filter:
      order: -100
  web:
    verify:
      mail-limit: 60
    flow:
      period: 3
      limit: 10
      block: 30
    cors:
      origin: "*"
      credentials: true
      methods: "*"

  jackson:
    # 统一JSON序列化时区为东八区，避免接口响应中的时间显示为 +00:00 引发前端展示歧义
    time-zone: Asia/Shanghai

app:
  file-storage:
    minio:
      # endpoint: http://192.168.116.128:9000
      endpoint: ${APP_FILE_STORAGE_MINIO_ENDPOINT}
      accessKey: ${APP_FILE_STORAGE_MINIO_ACCESS_KEY}
      secretKey: ${APP_FILE_STORAGE_MINIO_SECRET_KEY}
      bucketName: ${APP_FILE_STORAGE_MINIO_BUCKET_NAME}
  id-generator:
    enable-uuid-fallback: true
    append-uuid: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.daox.online.entity.DO
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# [新增] 自定义 RabbitMQ 配置
amqp:
  exchange:
    assessment: assessment.exchange
  routing-key:
    submission: assessment.submission.new
