spring:
  application:
    name: OnlineMSBackEnd

  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB
      enabled: true
  rabbitmq:
    # addresses: 192.168.116.128
    addresses: 192.168.15.128
    port: 5672
    username: admin
    password: admin
    virtual-host: /educate
    publisher-confirm-type: correlated
    publisher-returns: true
  datasource:
    # 统一使用东八区，避免前端输入本地时间后在JDBC层被按UTC偏移8小时写入数据库
    # 说明：
    # 1) 前端传入的是本地业务时间（如 2026-03-05 00:00:00）
    # 2) 后端当前时间模型包含 java.util.Date（瞬时时间），会经过JDBC时区换算
    # 3) 若此处配置为 UTC，会出现“前端00:00，数据库落16:00(前一天)”的问题
    # 因此将 serverTimezone 调整为 Asia/Shanghai，保证写入与读取都按业务时区一致
    url: jdbc:mysql://localhost:3306/online_educate?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 101.126.19.83
      port: 6379
      password: my_super_strong_password_DaoXuanAdmin_redis1
    mongodb:
      host: 101.126.19.83
      port: 27017
      database: online_educate
      username: daoxuanadmin
      password: DaoXuanAdmin
      authentication-database: admin
      uri: mongodb://daoxuanadmin:DaoXuanAdmin@101.126.19.83:27017/online_educate?authSource=admin&socketTimeoutMS=60000&connectTimeoutMS=10000
  mail:
    host: smtp.163.com
    username: daoxuan5117@163.com
    password: NC3WnkKRRKU6q6NQ
    default-encoding: utf-8
  security:
    jwt:
      key: 'q1w2e3r0r9t7y.k8z0o2p3z4m5d6f7k5g7c'
      expire: 72
      limit:
        base: 10
        upgrade: 300
        frequency: 30
    filter:
      order: -100
  web:
    verify:
      mail-limit: 60
    flow:
      period: 3
      limit: 10
      block: 30
    cors:
      origin: "*"
      credentials: true
      methods: "*"

  jackson:
    # 统一JSON序列化时区为东八区，避免接口响应中的时间显示为 +00:00 引发前端展示歧义
    time-zone: Asia/Shanghai

app:
